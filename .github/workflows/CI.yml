name: CI - Validate Velociraptor Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-artifacts:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate artifact YAML files
        run: |
          python3 - <<'EOF'
          #!/usr/bin/env python3
          """Validate all Velociraptor artifact YAML files"""
          import yaml, sys, os, glob, re

          errors = []
          warnings = []

          yaml_files = glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)
          yaml_files = [f for f in yaml_files if '.github' not in f]

          for filepath in yaml_files:
              try:
                  with open(filepath) as f:
                      data = yaml.safe_load(f)

                  # Required fields
                  for field in ['name', 'description', 'sources']:
                      if not data or field not in data:
                          errors.append(f"{filepath}: missing required field '{field}'")

                  # MITRE reference check (warning only — not required)
                  content = open(filepath).read()
                  has_mitre = bool(re.search(r'T\d{4}(\.\d{3})?', content))
                  if not has_mitre:
                      warnings.append(f"{filepath}: no MITRE ATT&CK reference (optional)")

                  # Sources must have VQL
                  if data and 'sources' in data:
                      for src in data['sources']:
                          if 'query' not in src and 'queries' not in src:
                              errors.append(f"{filepath}: source missing VQL query")

              except yaml.YAMLError as e:
                  errors.append(f"{filepath}: YAML parse error: {e}")
              except Exception as e:
                  errors.append(f"{filepath}: {e}")

          print(f"✅ Validated {len(yaml_files)} artifacts")
          if warnings:
              print(f"⚠️  Warnings ({len(warnings)}):")
              for w in warnings: print(f"  - {w}")
          if errors:
              print(f"❌ Errors ({len(errors)}):")
              for e in errors: print(f"  - {e}")
              sys.exit(1)
          else:
              print("✅ All artifacts valid!")
          EOF

  coverage-report:
    name: MITRE Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate MITRE coverage report
        run: |
          python3 - <<'EOF'
          #!/usr/bin/env python3
          """Generate MITRE ATT&CK coverage report for Velociraptor artifacts"""
          import yaml, glob, re, os

          # MITRE tactic prefixes mapping (rough categorization by technique range)
          TACTIC_MAP = {
              "Initial Access":       (1189, 1200),
              "Execution":            (1059, 1072),
              "Persistence":          (1037, 1058),
              "Privilege Escalation": (1134, 1188),
              "Defense Evasion":      (1014, 1036),
              "Credential Access":    (1003, 1013),
              "Discovery":            (1007, 1003),
              "Lateral Movement":     (1021, 1025),
              "Collection":           (1005, 1021),
              "Command and Control":  (1071, 1102),
              "Exfiltration":         (1011, 1020),
              "Impact":               (1485, 1500),
          }

          yaml_files = glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)
          yaml_files = [f for f in yaml_files if '.github' not in f]

          total = len(yaml_files)
          mitre_covered = []
          no_mitre = []
          all_techniques = []

          for filepath in yaml_files:
              try:
                  content = open(filepath).read()
                  techniques = re.findall(r'T(\d{4})(?:\.\d{3})?', content)
                  if techniques:
                      mitre_covered.append(filepath)
                      all_techniques.extend([f"T{t}" for t in techniques])
                  else:
                      no_mitre.append(filepath)
              except Exception:
                  pass

          unique_techniques = sorted(set(all_techniques))
          coverage_pct = round(len(mitre_covered) / total * 100, 1) if total > 0 else 0

          # Build job summary
          summary = []
          summary.append("# 🛡️ MITRE ATT&CK Coverage Report\n")
          summary.append(f"| Metric | Value |")
          summary.append(f"|--------|-------|")
          summary.append(f"| Total Artifacts | {total} |")
          summary.append(f"| Artifacts with MITRE refs | {len(mitre_covered)} |")
          summary.append(f"| Artifacts without MITRE refs | {len(no_mitre)} |")
          summary.append(f"| Coverage | **{coverage_pct}%** |")
          summary.append(f"| Unique Techniques | {len(unique_techniques)} |")
          summary.append("")
          summary.append("## 🎯 Techniques Covered\n")
          if unique_techniques:
              summary.append(", ".join(f"`{t}`" for t in unique_techniques))
          else:
              summary.append("_None found_")
          summary.append("")
          summary.append("## ⚠️ Artifacts Missing MITRE References\n")
          if no_mitre:
              for f in no_mitre:
                  summary.append(f"- `{f}`")
          else:
              summary.append("_All artifacts have MITRE references!_ 🎉")

          report = "\n".join(summary)
          print(report)

          # Write to GitHub Step Summary
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(report + "\n")
          EOF
